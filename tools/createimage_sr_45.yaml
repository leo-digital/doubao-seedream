identity:
  name: "createimage"
  author: "stevenup"
  label:
    en_US: "createimage"
    zh_Hans: "图片生成4.5"
description:
  human:
    en_US: "Use doubao-seedream model to generate images"
    zh_Hans: "图生图，使用Seedream4.5模型"
  llm: "Generate a single image from a text prompt using Doubao Seedream."
output_schema:
  type: object
  properties:
    data:
      type: array
      items:
        type: object
        properties:
          url:
            type: string
          size:
            type: string
parameters:
  - name: sequential_image_generation
    type: boolean
    required: true
    label:
      en_US: Group Images
      zh_Hans: 是否生成组图
    human_description:
      en_US: "Text prompt to generate an image."
      zh_Hans: "默认生成单图"
    llm_description: "Text prompt to generate an image."
    default: false
    form: form
  - name: max_images
    type: number
    required: false
    label:
      en_US: Count
      zh_Hans: 生成组图数量
    human_description:
      en_US: "Text prompt to generate an image."
      zh_Hans: "生成组图数量"
    llm_description: "Text prompt to generate an image."
    form: form
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt
      zh_Hans: 提示词
    human_description:
      en_US: "Text prompt to generate an image."
      zh_Hans: "用于生成图片的文本提示词。"
    llm_description: "Text prompt to generate an image."
    form: form
  - name: image
    type: files
    required: false
    label:
      en_US: Image
      zh_Hans: 图片
    human_description:
      en_US: "Image to use as a starting point for image generation."
      zh_Hans: "输入的图片信息"
    llm_description: "Text prompt to generate an image."
    form: form
  - name: size
    type: select
    required: false
    default: "2K"
    disabled: true
    label:
      en_US: Size
      zh_Hans: 尺寸
    options:
      - label:
          zh_Hans: "2K"
          en_US: "2K"
        value: "2K"
      - label:
          zh_Hans: "4K"
          en_US: "4K"
        value: "4K"
      - label:
          zh_Hans: "1:1[2048x2048]"
          en_US: "1:1[2048x2048]"
        value: "2048x2048"
      - label:
          zh_Hans: "4:3[2304x1728]"
          en_US: "4:3[2304x1728]"
        value: "2304x1728"
      - label:
          zh_Hans: "3:4[1728x2304]"
          en_US: "3:4[1728x2304]"
        value: "1728x2304"
      - label:
          zh_Hans: "16:9[2560x1440]"
          en_US: "16:9[2560x1440]"
        value: "2560x1440"
      - label:
          zh_Hans: "9:16[1440x2560]"
          en_US: "9:16[1440x2560]"
        value: "1440x2560"
      - label:
          zh_Hans: "3:2[2496x1664]"
          en_US: "3:2[2496x1664]"
        value: "2496x1664"
      - label:
          zh_Hans: "2:3[1664x2496]"
          en_US: "2:3[1664x2496]"
        value: "1664x2496"
      - label:
          zh_Hans: "21:9[3024x1296]"
          en_US: "21:9[3024x1296]"
        value: "3024x1296"
      - label:
          zh_Hans: "自定义"
          en_US: "customize"
        value: "customize"
    human_description:
      en_US: "Image size. Common values: 1K, 2K."
      zh_Hans: "图片尺寸。常用值：2K、4K。"
    llm_description: "Image size. Default: 2K."
    form: form
  - name: width
    type: number
    required: false
    label:
      en_US: Width
      zh_Hans: 自定义宽度
    human_description:
      en_US: "Image to use as a starting point for image generation."
      zh_Hans: "自定义图片宽度"
    llm_description: "Text prompt to generate an image."
    form: form
  - name: height
    type: number
    required: false
    label:
      en_US: Height
      zh_Hans: 自定义高度
    human_description:
      en_US: "Image to use as a starting point for image generation."
      zh_Hans: "自定义图片高度"
    llm_description: "Text prompt to generate an image."
    form: form
  - name: watermark
    type: boolean
    required: false
    default: false
    label:
      en_US: Watermark
      zh_Hans: 水印
      pt_BR: Marca d'água
      ja_JP: 透かし
    human_description:
      en_US: "Whether to add watermark."
      zh_Hans: "是否添加水印。"
      pt_BR: "Adicionar marca d'água."
      ja_JP: "透かしを追加するかどうか。"
    llm_description: "Whether to add watermark. Default: false."
    form: form
  # - name: model
  #   type: string
  #   required: false
  #   default: "doubao-seedream-4-5-251128"
  #   label:
  #     en_US: Model
  #     zh_Hans: 模型
  #     pt_BR: Modelo
  #     ja_JP: モデル
  #   human_description:
  #     en_US: "Ark model name. Default: doubao-seedream-4-5-251128."
  #     zh_Hans: "Ark 模型名称。默认：doubao-seedream-4-5-251128。"
  #     pt_BR: "Nome do modelo Ark. Padrão: doubao-seedream-4-5-251128."
  #     ja_JP: "Ark のモデル名。既定: doubao-seedream-4-5-251128。"
  #   llm_description: "Ark model name for image generation."
  #   form: form
extra:
  python:
    source: tools/createimage_sr_45.py
