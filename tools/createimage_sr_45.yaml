identity:
  name: "ImageGenerations"
  author: "leo-digital"
  label:
    en_US: "ImageGenerations"
    zh_Hans: "图片生成4.5"
description:
  human:
    en_US: "Use doubao-seedream-4.5 model to generate images"
    zh_Hans: "使用 doubao-seedream-4.5 模型生成图像"
  llm: "Generate images using Doubao Seedream 4.5 based on."
output_schema:
  type: object
  properties:
    images:
      type: array
      items:
        type: object
        properties:
          url:
            type: string
          size:
            type: string
parameters:
  - name: sequential_image_generation
    type: boolean
    required: true
    label:
      en_US: Whether to generate a group images
      zh_Hans: 是否生成组图
    human_description:
      en_US: "Text prompt to generate an image."
      zh_Hans: "True 为生成组图，False 为单图。默认生成单图"
    llm_description: "True means generating a group of images, False means generating a single image. By default, a single image is generated."
    default: false
    form: form
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt words for image generation
      zh_Hans: 文本提示词
    human_description:
      en_US: "Prompt words for image generation, supporting both Chinese and English."
      zh_Hans: "文本提示词，用于生成图像的提示词"
    llm_description: "Prompt words for image generation."
    form: form
  - name: image
    type: files
    required: false
    label:
      en_US: Image list
      zh_Hans: 图片列表
    human_description:
      en_US: "Pass in the list of node images."
      zh_Hans: "传入节点图片列表"
    llm_description: "Pass in the list of node images."
    form: form
  - name: size
    type: select
    required: false
    default: "2K"
    disabled: true
    label:
      en_US: Size
      zh_Hans: 尺寸
    options:
      - label:
          zh_Hans: "2K"
          en_US: "2K"
        value: "2K"
      - label:
          zh_Hans: "4K"
          en_US: "4K"
        value: "4K"
      - label:
          zh_Hans: "1:1[2048x2048]"
          en_US: "1:1[2048x2048]"
        value: "2048x2048"
      - label:
          zh_Hans: "4:3[2304x1728]"
          en_US: "4:3[2304x1728]"
        value: "2304x1728"
      - label:
          zh_Hans: "3:4[1728x2304]"
          en_US: "3:4[1728x2304]"
        value: "1728x2304"
      - label:
          zh_Hans: "16:9[2560x1440]"
          en_US: "16:9[2560x1440]"
        value: "2560x1440"
      - label:
          zh_Hans: "9:16[1440x2560]"
          en_US: "9:16[1440x2560]"
        value: "1440x2560"
      - label:
          zh_Hans: "3:2[2496x1664]"
          en_US: "3:2[2496x1664]"
        value: "2496x1664"
      - label:
          zh_Hans: "2:3[1664x2496]"
          en_US: "2:3[1664x2496]"
        value: "1664x2496"
      - label:
          zh_Hans: "21:9[3024x1296]"
          en_US: "21:9[3024x1296]"
        value: "3024x1296"
      - label:
          zh_Hans: "自定义"
          en_US: "customize"
        value: "customize"
    human_description:
      en_US: "Image size. Common values: 2K, 4K. Selecting 'customize' allows you to customize the image width and height. Default value: 2K"
      zh_Hans: "图片尺寸。常用值：2K、4K。选择自定义可自定义图片宽高。默认值：2K"
    llm_description: "Image size. Common values: 2K, 4K. Selecting 'customize' allows you to customize the image width and height. Default value: 2K."
    form: form
  - name: width
    type: number
    required: false
    label:
      en_US: Custom width
      zh_Hans: 自定义宽度
    human_description:
      en_US: "Customize the image width. The total pixel range of width * height is [3686400, 16777216], and the range of width/height is [1/16, 16]."
      zh_Hans: "自定义图片宽度，宽度*高度的总像素范围 [3686400, 16777216]，宽度/高度的范围 [1/16, 16]"
    llm_description: "Customize the image width."
    form: form
  - name: height
    type: number
    required: false
    label:
      en_US: Custom height
      zh_Hans: 自定义高度
    human_description:
      en_US: "Customize the image height. The total pixel range of width * height is [3686400, 16777216], and the range of width/height is [1/16, 16]."
      zh_Hans: "自定义图片高度，宽度*高度的总像素范围 [3686400, 16777216]，宽度/高度的范围 [1/16, 16]"
    llm_description: "Customize the image height."
    form: form
  - name: watermark
    type: boolean
    required: false
    default: false
    label:
      en_US: Watermark
      zh_Hans: 水印
    human_description:
      en_US: "Whether to add watermark."
      zh_Hans: "生成图片是否包含水印，True 为生成，False为不生成，默认为不生成"
    llm_description: "Whether to add watermark. Default: false."
    form: form
extra:
  python:
    source: tools/createimage_sr_45.py
