identity:
  name: "image2image"
  author: "stevenup"
  label:
    en_US: "image2image"
    zh_Hans: "图生图4.5"
    pt_BR: "text2image"
    ja_JP: "text2image"
description:
  human:
    en_US: "Use doubao-seedream model to generate images"
    zh_Hans: "图生图，使用Seedream4.5模型"
    pt_BR: "Use doubao-seedream model to generate images"
    ja_JP: "Use doubao-seedream model to generate images"
  llm: "Generate a single image from a text prompt using Doubao Seedream."
parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt
      zh_Hans: 提示词
      pt_BR: Prompt
      ja_JP: プロンプト
    human_description:
      en_US: "Text prompt to generate an image."
      zh_Hans: "用于生成图片的文本提示词。"
      pt_BR: "Prompt de texto para gerar uma imagem."
      ja_JP: "画像生成のためのテキストプロンプト。"
    llm_description: "Text prompt to generate an image."
    form: form
  - name: size
    type: string
    required: false
    default: "2K"
    label:
      en_US: Size
      zh_Hans: 尺寸
      pt_BR: Tamanho
      ja_JP: サイズ
    human_description:
      en_US: "Image size. Common values: 1K, 2K."
      zh_Hans: "图片尺寸。常用值：1K、2K。"
      pt_BR: "Tamanho da imagem. Valores comuns: 1K, 2K."
      ja_JP: "画像サイズ。一般的な値: 1K, 2K。"
    llm_description: "Image size. Default: 2K."
    form: form
  - name: watermark
    type: boolean
    required: false
    default: false
    label:
      en_US: Watermark
      zh_Hans: 水印
      pt_BR: Marca d'água
      ja_JP: 透かし
    human_description:
      en_US: "Whether to add watermark."
      zh_Hans: "是否添加水印。"
      pt_BR: "Adicionar marca d'água."
