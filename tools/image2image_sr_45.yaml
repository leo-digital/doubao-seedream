    llm_description: "Whether to add watermark. Default: false."
    form: form
  - name: model
    type: string
    required: false
    default: "doubao-seedream-4-5-251128"
    label:
      en_US: Model
      zh_Hans: 模型
      pt_BR: Modelo
      ja_JP: モデル
    human_description:
      en_US: "Ark model name. Default: doubao-seedream-4-5-251128."
      zh_Hans: "Ark 模型名称。默认：doubao-seedream-4-5-251128。"
      pt_BR: "Nome do modelo Ark. Padrão: doubao-seedream-4-5-251128."
      ja_JP: "Ark のモデル名。既定: doubao-seedream-4-5-251128。"
    llm_description: "Ark model name for image generation."
    form: form
