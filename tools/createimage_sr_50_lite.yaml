identity:
  name: "ImageGenerations50Lite"
  author: "leo-digital"
  label:
    en_US: "ImageGenerations (5.0-lite)"
    zh_Hans: "图片生成5.0-lite"
description:
  human:
    en_US: "Use doubao-seedream-5.0-lite model to generate images (supports PNG and web search)."
    zh_Hans: "使用 doubao-seedream-5.0-lite 模型生成图像（支持 PNG 与联网搜索）。"
  llm: "Generate images using Doubao Seedream 5.0-lite based on."
output_schema:
  type: object
  properties:
    images:
      type: array
      items:
        type: object
        properties:
          url:
            type: string
          size:
            type: string
parameters:
  - name: sequential_image_generation
    type: boolean
    required: true
    label:
      en_US: Whether to generate a group images
      zh_Hans: 是否生成组图
    human_description:
      en_US: "Whether to generate a group of images (up to 15). True for group, False for single."
      zh_Hans: "True 为生成组图，False 为单图。默认生成单图"
    llm_description: "True means generating a group of images, False means generating a single image. By default, a single image is generated."
    default: false
    form: form
  - name: web_search
    type: boolean
    required: false
    label:
      en_US: Web search
      zh_Hans: 联网搜索
    human_description:
      en_US: "Enable web search tool (the model will decide whether to search). Web search is only effective for text-to-image."
      zh_Hans: "开启联网搜索工具（模型将自行判断是否进行搜索）。联网搜索只对文生图有效。"
    llm_description: "Enable web search tool for time-sensitive knowledge. Default: false."
    default: false
    form: form
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt words for image generation
      zh_Hans: 文本提示词
    human_description:
      en_US: "Prompt words for image generation, supporting both Chinese and English."
      zh_Hans: "文本提示词，用于生成图像的提示词"
    llm_description: "Prompt words for image generation."
    form: form
  - name: image
    type: files
    required: false
    label:
      en_US: Image list
      zh_Hans: 图片列表
    human_description:
      en_US: "Reference image list (up to 14)."
      zh_Hans: "参考图片列表（最多 14 张）"
    llm_description: "Reference image list (up to 14)."
    form: form
  - name: size
    type: select
    required: false
    default: "2K"
    label:
      en_US: Size
      zh_Hans: 尺寸
    options:
      - label:
          zh_Hans: "2K"
          en_US: "2K"
        value: "2K"
      - label:
          zh_Hans: "3K"
          en_US: "3K"
        value: "3K"
      - label:
          zh_Hans: "2K 1:1[2048x2048]"
          en_US: "2K 1:1[2048x2048]"
        value: "2048x2048"
      - label:
          zh_Hans: "2K 4:3[2304x1728]"
          en_US: "2K 4:3[2304x1728]"
        value: "2304x1728"
      - label:
          zh_Hans: "2K 3:4[1728x2304]"
          en_US: "2K 3:4[1728x2304]"
        value: "1728x2304"
      - label:
          zh_Hans: "2K 16:9[2848x1600]"
          en_US: "2K 16:9[2848x1600]"
        value: "2848x1600"
      - label:
          zh_Hans: "2K 9:16[1600x2848]"
          en_US: "2K 9:16[1600x2848]"
        value: "1600x2848"
      - label:
          zh_Hans: "2K 3:2[2496x1664]"
          en_US: "2K 3:2[2496x1664]"
        value: "2496x1664"
      - label:
          zh_Hans: "2K 2:3[1664x2496]"
          en_US: "2K 2:3[1664x2496]"
        value: "1664x2496"
      - label:
          zh_Hans: "2K 21:9[3136x1344]"
          en_US: "2K 21:9[3136x1344]"
        value: "3136x1344"
      - label:
          zh_Hans: "3K 1:1[3072x3072]"
          en_US: "3K 1:1[3072x3072]"
        value: "3072x3072"
      - label:
          zh_Hans: "3K 4:3[3456x2592]"
          en_US: "3K 4:3[3456x2592]"
        value: "3456x2592"
      - label:
          zh_Hans: "3K 3:4[2592x3456]"
          en_US: "3K 3:4[2592x3456]"
        value: "2592x3456"
      - label:
          zh_Hans: "3K 16:9[4096x2304]"
          en_US: "3K 16:9[4096x2304]"
        value: "4096x2304"
      - label:
          zh_Hans: "3K 9:16[2304x4096]"
          en_US: "3K 9:16[2304x4096]"
        value: "2304x4096"
      - label:
          zh_Hans: "3K 3:2[3744x2496]"
          en_US: "3K 3:2[3744x2496]"
        value: "3744x2496"
      - label:
          zh_Hans: "3K 2:3[2496x3744]"
          en_US: "3K 2:3[2496x3744]"
        value: "2496x3744"
      - label:
          zh_Hans: "3K 21:9[4704x2016]"
          en_US: "3K 21:9[4704x2016]"
        value: "4704x2016"
      - label:
          zh_Hans: "自定义"
          en_US: "customize"
        value: "customize"
    human_description:
      en_US: "Image size. Choose 2K/3K, a recommended pixel preset, or customize width/height."
      zh_Hans: "图片尺寸。可选 2K/3K、推荐像素预设，或自定义宽高。"
    llm_description: "Image size. Choose 2K/3K, a recommended pixel preset, or customize width/height."
    form: form
  - name: width
    type: number
    required: false
    label:
      en_US: Custom width
      zh_Hans: 自定义宽度
    human_description:
      en_US: "Custom image width (px), effective only when 'size' is 'customize'. Total pixels (width*height): [3686400, 10404496]; aspect ratio (width/height): [1/16, 16]."
      zh_Hans: "自定义图片宽度（px），仅当 size 为“自定义”时生效。总像素（宽*高）取值范围：[3686400, 10404496]；宽高比取值范围：[1/16, 16]。"
    llm_description: "Custom image width (px), effective only when 'size' is 'customize'."
    form: form
  - name: height
    type: number
    required: false
    label:
      en_US: Custom height
      zh_Hans: 自定义高度
    human_description:
      en_US: "Custom image height (px), effective only when 'size' is 'customize'. Total pixels (width*height): [3686400, 10404496]; aspect ratio (width/height): [1/16, 16]."
      zh_Hans: "自定义图片高度（px），仅当 size 为“自定义”时生效。总像素（宽*高）取值范围：[3686400, 10404496]；宽高比取值范围：[1/16, 16]。"
    llm_description: "Custom image height (px), effective only when 'size' is 'customize'."
    form: form
  - name: output_format
    type: select
    required: false
    default: "jpeg"
    label:
      en_US: Output format
      zh_Hans: 输出格式
    options:
      - label:
          zh_Hans: "jpeg"
          en_US: "jpeg"
        value: "jpeg"
      - label:
          zh_Hans: "png"
          en_US: "png"
        value: "png"
    human_description:
      en_US: "Output image format. Default: jpeg."
      zh_Hans: "输出图片格式。默认：jpeg。"
    llm_description: "Output image format. Default: jpeg."
    form: form
  - name: watermark
    type: boolean
    required: false
    default: false
    label:
      en_US: Watermark
      zh_Hans: 水印
    human_description:
      en_US: "Whether to add watermark."
      zh_Hans: "生成图片是否包含水印，True 为生成，False为不生成，默认为不生成"
    llm_description: "Whether to add watermark. Default: false."
    form: form
extra:
  python:
    source: tools/createimage_sr_50_lite.py
